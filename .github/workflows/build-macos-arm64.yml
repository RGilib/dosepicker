name: Build macOS arm64 app

on:
  workflow_dispatch:      # puoi avviarlo a mano da GitHub
  push:
    tags: ["v*"]          # parte anche quando fai un tag tipo v1.0.0

jobs:
  macos-arm64:
    runs-on: macos-14     # runner Apple Silicon (arm64)
    permissions:
      contents: write     # serve solo se pubblichi su Release (step finale)
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11 (arm64)
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          architecture: "arm64"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python - << 'PY'
import tkinter as tk
print("✅ Tkinter OK")
PY

      - name: Build .app
        run: |
          APP_NAME="DosePicker"       # cambia nome qui se vuoi
          ICON_FLAG=""
          if [ -f icon.icns ]; then
            ICON_FLAG="--icon icon.icns"
          fi

          # genera l'app (.app) senza finestra console
          pyinstaller --windowed --name "$APP_NAME" \
            --collect-all pandas --collect-all openpyxl \
            $ICON_FLAG main.py

          echo "Controllo architettura binario:"
          file "dist/$APP_NAME.app/Contents/MacOS/$APP_NAME"

      - name: Ad-hoc sign (no Apple ID)
        run: |
          APP_NAME="DosePicker"
          codesign --deep --force --sign - "dist/$APP_NAME.app" || true

      - name: Zip app bundle (da scaricare)
        run: |
          APP_NAME="DosePicker"
          ditto -c -k --sequesterRsrc --keepParent \
            "dist/$APP_NAME.app" "$APP_NAME-mac-arm64.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DosePicker-mac-arm64
          path: DosePicker-mac-arm64.zip

      # --- OPZIONALE: carica lo ZIP in "Releases" quando tagghi v* ---
      - name: Publish Release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: DosePicker-mac-arm64.zip
